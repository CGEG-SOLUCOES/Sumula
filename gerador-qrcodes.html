<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de QR Codes · Kit de Campo · PGE em Campo 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f2f4f8; margin: 0; padding: 24px; color: #16233b; }
  .header { max-width: 900px; margin: 0 auto 24px; }
  h1 { font-size: 22px; margin: 0 0 6px; }
  .subtitle { color: #5a6b8c; font-size: 14px; margin: 0 0 4px; }
  .config-box { max-width: 900px; margin: 0 auto 24px; background: white; border-radius: 12px; padding: 16px 20px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
  .config-box label { font-size: 13px; font-weight: 600; color: #5a6b8c; display: block; margin-bottom: 6px; }
  .config-box input { width: 100%; max-width: 500px; padding: 10px 12px; border-radius: 8px; border: 1.5px solid #dbe2ee; font-size: 14px; }
  .no-print { }
  @media print {
    .no-print { display: none !important; }
    .card { break-inside: avoid; page-break-inside: avoid; }
    body { background: white; padding: 0; }
  }
  .btn-print { background: #1fa85a; color: white; border: none; padding: 12px 22px; border-radius: 999px; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 10px; }
  .grid { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; }
  .card { background: white; border-radius: 14px; padding: 18px; text-align: center; box-shadow: 0 2px 10px rgba(0,0,0,.06); border-top: 6px solid #ccc; }
  .card.c-europa { border-top-color: #2f6fed; }
  .card.c-americas { border-top-color: #24a854; }
  .card.c-africa { border-top-color: #e0921e; }
  .card.c-asia { border-top-color: #d93a3a; }
  .card .continente { font-size: 10.5px; text-transform: uppercase; letter-spacing: .5px; color: #8b97ad; font-weight: 700; margin-bottom: 4px; }
  .card .nome { font-size: 18px; font-weight: 800; margin-bottom: 12px; }
  .qr-holder { display: flex; justify-content: center; margin-bottom: 10px; }
  .card .url { font-size: 10px; color: #8b97ad; word-break: break-all; }
</style>
</head>
<body>

<div class="header no-print">
  <h1>Gerador de QR Codes — Kit de Campo</h1>
  <p class="subtitle">Cada QR Code leva direto ao formulário de Súmula já com o time pré-selecionado.</p>
  <p class="subtitle">Ajuste o endereço do site abaixo, depois clique em "Imprimir" (Ctrl+P).</p>
</div>

<div class="config-box no-print">
  <label for="base-url">Endereço do site (sem "sumula.html" no final)</label>
  <input type="text" id="base-url" value="https://cgeg-solucoes.github.io/EncontroServidores/">
  <br>
  <button class="btn-print" id="btn-gerar">Gerar QR Codes</button>
  <button class="btn-print" onclick="window.print()" style="background:#16233b;">🖨️ Imprimir</button>
</div>

<div class="grid" id="grid"></div>

<script>
const TIMES = {
  alemanha:{nome:"Alemanha",continente:"europa"}, franca:{nome:"França",continente:"europa"},
  portugal:{nome:"Portugal",continente:"europa"}, italia:{nome:"Itália",continente:"europa"},
  espanha:{nome:"Espanha",continente:"europa"},
  brasil:{nome:"Brasil",continente:"americas"}, argentina:{nome:"Argentina",continente:"americas"},
  mexico:{nome:"México",continente:"americas"}, canada:{nome:"Canadá",continente:"americas"},
  chile:{nome:"Chile",continente:"americas"},
  ruanda:{nome:"Ruanda",continente:"africa"}, africadosul:{nome:"África do Sul",continente:"africa"},
  quenia:{nome:"Quênia",continente:"africa"}, egito:{nome:"Egito",continente:"africa"},
  marrocos:{nome:"Marrocos",continente:"africa"},
  singapura:{nome:"Singapura",continente:"asia"}, japao:{nome:"Japão",continente:"asia"},
  coreiadosul:{nome:"Coreia do Sul",continente:"asia"}, india:{nome:"Índia",continente:"asia"},
  emirados:{nome:"Emirados",continente:"asia"}
};

const CONTINENTE_LABEL = { europa: "Europa", americas: "Américas", africa: "África", asia: "Ásia" };

function gerar() {
  let baseUrl = document.getElementById("base-url").value.trim();
  if (!baseUrl.endsWith("/")) baseUrl += "/";

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  Object.entries(TIMES).forEach(([id, t]) => {
    const url = `${baseUrl}sumula.html?pais=${id}`;

    const card = document.createElement("div");
    card.className = `card c-${t.continente}`;
    card.innerHTML = `
      <div class="continente">${CONTINENTE_LABEL[t.continente]}</div>
      <div class="nome">${t.nome}</div>
      <div class="qr-holder" id="qr-${id}"></div>
      <div class="url">${url}</div>
    `;
    grid.appendChild(card);

    new QRCode(document.getElementById(`qr-${id}`), {
      text: url,
      width: 160,
      height: 160,
      colorDark: "#16233b",
      colorLight: "#ffffff"
    });
  });
}

document.getElementById("btn-gerar").addEventListener("click", gerar);
gerar();
</script>
</body>
</html>
